name: Tip packages

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: tip-packages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build ${{ matrix.arch }} package
    strategy:
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    container: rust:trixie

    steps:
      - uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          apt-get update
          apt-get install --yes --no-install-recommends dpkg-dev make

      - name: Build Debian package
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          make deb CARGO=cargo

      - uses: actions/upload-artifact@v7
        with:
          name: bbcat-thumbnailer-deb-${{ matrix.arch }}
          path: dist/*.deb
          if-no-files-found: error

  tip-release:
    name: Update tip release
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: bbcat-thumbnailer-deb-*
          path: dist
          merge-multiple: true

      - name: Move tip tag to this commit
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/tip" >/dev/null 2>&1; then
            gh api --method PATCH "repos/$GITHUB_REPOSITORY/git/refs/tags/tip" \
              -f sha="$GITHUB_SHA" -F force=true >/dev/null
          else
            gh api --method POST "repos/$GITHUB_REPOSITORY/git/refs" \
              -f ref=refs/tags/tip -f sha="$GITHUB_SHA" >/dev/null
          fi

      - name: Update prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          notes="Automated packages for commit \`$GITHUB_SHA\`."
          if gh release view tip --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release edit tip --repo "$GITHUB_REPOSITORY" --title "Tip build" \
              --prerelease --notes "$notes"
          else
            gh release create tip --repo "$GITHUB_REPOSITORY" --title "Tip build" \
              --prerelease --notes "$notes"
          fi

          release_id=$(gh api "repos/$GITHUB_REPOSITORY/releases/tags/tip" --jq .id)
          gh api --paginate "repos/$GITHUB_REPOSITORY/releases/$release_id/assets" \
            --jq '.[] | select(.name | endswith(".deb")) | .id' |
            while read -r asset_id; do
              gh api --method DELETE \
                "repos/$GITHUB_REPOSITORY/releases/assets/$asset_id"
            done

          gh release upload tip dist/*.deb --repo "$GITHUB_REPOSITORY" --clobber
